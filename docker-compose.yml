version: "3.9"

services:

  api:
    build: .
    container_name: cdr_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./output:/app/output
      - ./exports:/app/exports
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: cdr_worker
    restart: always
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    depends_on:
      - redis
    volumes:
      - ./output:/app/output
      - ./exports:/app/exports
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo

  beat:
    build: .
    container_name: cdr_beat
    restart: always
    command: celery -A app.tasks beat --loglevel=info
    depends_on:
      - redis
    volumes:
      - ./output:/app/output
      - ./exports:/app/exports
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo

  redis:
    image: redis:7
    container_name: cdr_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data: